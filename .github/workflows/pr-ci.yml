name: pr-ci

# PREVENTIVE per-PR gate for mitl. Lightweight (no torch) so it finishes in
# ~1 min. Mark ONLY `ci-passed` as the required status check in the ruleset.
on:
  pull_request:
  merge_group:
  push:
    branches-ignore: [main]

permissions:
  contents: read

concurrency:
  group: pr-ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: test (py${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.9", "3.12"]   # span the requires-python >=3.8 range
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install (editable + dev extras)
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"
      # The 5 protected public signatures (test_api_stability.py) are the tripwire
      # for the "downstream ics-sim depends on this — bump major on change" invariant.
      - name: Tests
        run: pytest -q --maxfail=1
      - name: Lint (package + tests)
        run: ruff check mitl tests

  ci-passed:
    name: ci-passed
    needs: [test]
    runs-on: ubuntu-latest
    steps:
      - run: echo "all required checks passed"
